#https://emojipedia.org for emotes

name: ci

on:
  workflow_dispatch:
    inputs:
      cacheClean:
        description: 'CI Cache Clean'
        required: false
        default: ''
      name:
        description: 'Name of the proceedings to update'
        required: true
        default: 'PFIAS'
      domain:
        description: 'Subdomain of the proceedings to update'
        required: true
        default: 'france'
#  push:
#    branches:
#      - main
#    paths-ignore:
#      - 'infra/**'

env:
  ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
  AWS_REGION: 'eu-west-3' # paris
  NODE_OPTIONS: '--max_old_space_size=4096' # fix heap out of memory error (nuxt generate)
  # `yarn` install used to hang for >15min at "[4/4] Building fresh
  # packages" because puppeteer@20's postinstall downloads a ~120MB
  # Chromium and stalls on the CI runner. Skip that download entirely;
  # both the direct puppeteer use (generateThumbnails.js) and pagedjs-cli
  # launch via puppeteer, which honours PUPPETEER_EXECUTABLE_PATH — set in
  # the "Setup Chrome" step below to the runner's installed Chrome.
  PUPPETEER_SKIP_DOWNLOAD: 'true'

jobs:
  install:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [18]

    steps:
      - name: 🛎 Checkout ${{ github.event.inputs.name }}
        # `submodules: false` here because actions/checkout fails the whole
        # workflow when PIAS's gitlink references a submodule SHA that's
        # missing from origin (e.g. a local-only commit that never got
        # pushed). The next step (`Update submodules`) does its own init
        # with `--remote`, which always tracks each submodule's origin/main
        # regardless of the (possibly stale) gitlink, so we don't need
        # actions/checkout to fetch the submodules at all.
        uses: actions/checkout@v3
        with:
          submodules: false
          token: ${{ secrets.SUBMODULE_GIT_TOKEN }}

      # Cancel previous runs to avoid wasting resources
      - name: 🧹 clean up runners
        # TODO replace hard coded references to the repo with variables
        run: |
          ids=$(gh api -H "Accept: application/vnd.github+json" /repos/IEA-Paris/PIAS/actions/runs | jq -s -c 'sort_by(.created_at) | .[]' | jq '.workflow_runs[] | select([.status] | inside(["in_progress", "queued"])) | .id')
          nids=$(echo $ids | wc -w)
          if [ $nids -gt 2 ]; then
            echo "too many runners"
            # Delete first and last runner
            ids=$(echo $ids | cut -d ' ' -f 2-  | rev | cut -d ' ' -f 2- | rev)
            set -- $ids
            # Stop all runners between first and last
            for i; do gh api --method POST -H "Accept: application/vnd.github+json" "/repos/IEA-Paris/PIAS/actions/runs/$i/cancel"; done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 🏗 Setup node env
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          check-latest: true

      - name: 🔄 Update submodules
        shell: bash
        env:
          # Use the same token actions/checkout would have used so private
          # submodules (PPIAS, PFIAS, SANDBOX) can be fetched.
          SUBMODULE_GIT_TOKEN: ${{ secrets.SUBMODULE_GIT_TOKEN }}
        run: |
          # Rewrite the GitHub URL once so all subsequent submodule fetches
          # carry the token. (actions/checkout did this for us when it
          # handled submodules; now we handle them ourselves.)
          git config --global url."https://x-access-token:${SUBMODULE_GIT_TOKEN}@github.com/".insteadOf "git@github.com:"
          # `--remote` makes git fetch each submodule's tracking branch
          # (origin/main) instead of trying to resolve the SHA recorded in
          # PIAS's gitlink. That SHA can be a local-only commit that was
          # never pushed (e.g. when a developer's PIAS commit accidentally
          # bumps the submodule pointer to an unpushed SHA). Using --remote
          # makes the CI self-healing for that case.
          git submodule update --init --remote --recursive
          git submodule foreach git config pull.rebase true
          # Make sure each submodule is on its main branch (the --remote
          # fetch can leave it on a detached HEAD at origin/main).
          git submodule foreach 'git checkout main && git pull origin main --allow-unrelated-histories'
          git checkout main
          git pull origin main --allow-unrelated-histories
          rm -rf ./static/*
          echo `ls submodules/${{ github.event.inputs.name }}`
          cp -r ./submodules/${{ github.event.inputs.name }}/config.js ./config.js 
          cp -r ./submodules/${{ github.event.inputs.name }}/generated .
          cp -r ./submodules/${{ github.event.inputs.name }}/static .
          cp -r ./submodules/${{ github.event.inputs.name }}/pdfs ./static
          cp -r ./submodules/${{ github.event.inputs.name }}/thumbnails ./static
          cp -r ./submodules/${{ github.event.inputs.name }}/bibliography ./static
          cp -r ./submodules/${{ github.event.inputs.name }}/svg ./static
          cp -r ./admin ./static

      - name: 🛠 Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "::set-output name=dir::$(yarn cache dir)"

      - name: 📦 Cache node_modules
        if: github.event.inputs.cacheClean == ''
        uses: actions/cache@v3
        id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      # Install a known-good Chrome and expose its path so puppeteer (used
      # directly by generateThumbnails.js and indirectly by pagedjs-cli for
      # PDFs) launches the system browser instead of a per-install download.
      # Paired with PUPPETEER_SKIP_DOWNLOAD=true (job env) this removes the
      # Chromium download that was hanging the install step.
      - name: 🧭 Setup Chrome for puppeteer/paged.js
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 🧭 Export Chrome path for puppeteer
        shell: bash
        run: echo "PUPPETEER_EXECUTABLE_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: 👨🏻‍💻 Install dependencies
        run: yarn

      - name: 🧪 Configure the CMS
        run: yarn configCMS

      #- name: Run tests 🧪
      #  run: yarn test

      - name: 🤞 Generate ${{ github.event.inputs.name }}
        run: yarn generate
        env:
          DEEPL_KEY: ${{ secrets.DEEPL_KEY }}
          orcid: ${{secrets.ORCID_SANDBOX_ID}}
          ORCID_SANDBOX_SECRET_KEY_ID: ${{secrets.ORCID_SANDBOX_SECRET_KEY_ID}}
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_SANDBOX_TOKEN: ${{ secrets.ZENODO_SANDBOX_TOKEN }}

      #   - name: Cache dist
      #    uses: actions/cache@v3
      #    with:
      #      path: dist
      #      key: ${{ matrix.os }}-node-v${{ matrix.node }}-${{ github.sha }}

      - name: ⤴️ Retro push generated content 🧙‍♂️
        # TODO replace hard coded references to the repo with variables
        shell: bash
        run: |
          cd submodules/${{ github.event.inputs.name }}
          PRE_SHA=$(git rev-parse HEAD)
          echo "PRE_SHA=$PRE_SHA" >> "$GITHUB_ENV"
          # Generated/curated assets live at the submodule root
          # (pdfs/, thumbnails/, svg/, bibliography/), not under static/.
          # They get copied into static/ at the start of the run via
          # `cp -r ./submodules/<name>/{pdfs,thumbnails,svg,bibliography} ./static`,
          # so the PIAS-root `static/<dir>/` is the canonical location during
          # the run. Push each back to its submodule-root home.
          rsync -av --delete ../../static/pdfs/         ./pdfs/
          rsync -av --delete ../../static/thumbnails/   ./thumbnails/
          rsync -av --delete ../../static/svg/          ./svg/
          rsync -av --delete ../../static/bibliography/ ./bibliography/
          # For the rest of static/, mirror back to the submodule's static/,
          # excluding the asset dirs handled above plus admin and sw.js.
          rsync -av \
            --exclude 'pdfs/' --exclude 'thumbnails/' --exclude 'svg/' --exclude 'bibliography/' \
            --exclude 'admin' --exclude 'sw.js' \
            ../../static/ ./static/
          git config --global user.name "CI"
          git config --global user.email "username@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "no generated changes to commit"
            echo "POST_SHA=$PRE_SHA" >> "$GITHUB_ENV"
          else
            git commit -m "[skip ci] auto-generated content"
            git status
            git push -f origin HEAD:main
            echo "POST_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          fi

      - name: 📝 Summarise generated artefacts
        if: always()
        shell: bash
        env:
          PROCEEDINGS: ${{ github.event.inputs.name }}
        run: |
          set -euo pipefail
          cd "submodules/${PROCEEDINGS}"

          summary="${GITHUB_STEP_SUMMARY:-/dev/stdout}"

          {
            echo "## ${PROCEEDINGS} — generated artefacts"
            echo ""
          } >> "$summary"

          if [ -z "${POST_SHA:-}" ] || [ "${POST_SHA}" = "${PRE_SHA:-}" ]; then
            echo "_No new content was retro-pushed in this run._" >> "$summary"
            exit 0
          fi

          # All paths added/modified in the auto-commit, NUL-separated for safety.
          CHANGED=()
          mapfile -d '' CHANGED < <(git diff --name-only -z --diff-filter=AM "${PRE_SHA}" "${POST_SHA}")

          filter_ext() {
            local prefix="$1"; shift
            local exts_re="$1"; shift
            for f in "${CHANGED[@]}"; do
              [[ -z "$f" ]] && continue
              if [[ "$f" == "$prefix"* ]] && [[ "$f" =~ \.($exts_re)$ ]]; then
                printf '%s\n' "$f"
              fi
            done | sort -u
          }

          # `git diff --diff-filter` doesn't expose Added-only directly across two SHAs reliably
          # when the file existed in PRE_SHA tree but not as the same blob — use a name-status pass
          # to separate Added vs Modified.
          declare -A STATUS
          while IFS=$'\t' read -r st path; do
            [[ -z "$path" ]] && continue
            STATUS["$path"]="$st"
          done < <(git diff --name-status "${PRE_SHA}" "${POST_SHA}")

          list_section() {
            local title="$1"; shift
            local files
            files=$(filter_ext "$@")
            local count
            count=$(printf '%s\n' "$files" | sed '/^$/d' | wc -l | tr -d ' ')
            echo "" >> "$summary"
            echo "### ${title} (${count})" >> "$summary"
            if [ "$count" = "0" ]; then
              echo "_none_" >> "$summary"
              return
            fi
            echo "" >> "$summary"
            echo "| Status | File |" >> "$summary"
            echo "| --- | --- |" >> "$summary"
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              local s="${STATUS[$f]:-?}"
              local label="modified"
              [[ "$s" == "A" ]] && label="new"
              echo "| ${label} | \`${f}\` |" >> "$summary"
            done <<< "$files"
          }

          list_section "PDFs"       "static/pdfs/"       "pdf"
          list_section "Thumbnails" "static/thumbnails/" "png|jpg|jpeg|webp|gif"
          list_section "SVGs"       "static/svg/"        "svg"

          # Images: anything image-ish under static/ that isn't already covered above.
          {
            echo ""
            echo "### Images (static/) — excluding pdfs/thumbnails/svg"
          } >> "$summary"
          IMG_LIST=$(
            for f in "${CHANGED[@]}"; do
              [[ -z "$f" ]] && continue
              [[ "$f" == static/pdfs/* ]] && continue
              [[ "$f" == static/thumbnails/* ]] && continue
              [[ "$f" == static/svg/* ]] && continue
              if [[ "$f" == static/* ]] && [[ "$f" =~ \.(png|jpe?g|webp|gif)$ ]]; then
                printf '%s\n' "$f"
              fi
            done | sort -u
          )
          IMG_COUNT=$(printf '%s\n' "$IMG_LIST" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$IMG_COUNT" = "0" ]; then
            echo "_none_" >> "$summary"
          else
            echo "" >> "$summary"
            echo "| Status | File |" >> "$summary"
            echo "| --- | --- |" >> "$summary"
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              s="${STATUS[$f]:-?}"
              label="modified"
              [[ "$s" == "A" ]] && label="new"
              echo "| ${label} | \`${f}\` |" >> "$summary"
            done <<< "$IMG_LIST"
          fi

          # Zenodo records: scan changed content/*.md files for newly written Zid / DOI.
          # A "new" record = Zid present in POST_SHA frontmatter and absent in PRE_SHA frontmatter.
          {
            echo ""
            echo "### Zenodo records"
          } >> "$summary"

          extract_field() {
            # extract_field <sha> <path> <field>  -> prints value or empty
            local sha="$1" p="$2" field="$3"
            { git show "${sha}:${p}" 2>/dev/null || true; } \
              | awk -v f="$field" '
                  /^---[[:space:]]*$/ { fm = !fm; if (!fm) exit; next }
                  fm && $0 ~ "^"f":[[:space:]]" {
                    sub("^"f":[[:space:]]*", "")
                    gsub(/^["\x27]|["\x27]$/, "")
                    print; exit
                  }'
          }

          MD_CHANGED=()
          for f in "${CHANGED[@]}"; do
            [[ "$f" == content/*.md ]] && MD_CHANGED+=("$f")
          done

          if [ "${#MD_CHANGED[@]}" -eq 0 ]; then
            echo "_no content frontmatter changes_" >> "$summary"
          else
            ZENODO_ROWS=""
            for f in "${MD_CHANGED[@]}"; do
              new_zid=$(extract_field "$POST_SHA" "$f" "Zid")
              new_doi=$(extract_field "$POST_SHA" "$f" "DOI")
              old_zid=$(extract_field "$PRE_SHA"  "$f" "Zid" || true)
              old_doi=$(extract_field "$PRE_SHA"  "$f" "DOI" || true)

              # Skip if nothing new
              if [ -z "$new_zid" ] && [ -z "$new_doi" ]; then continue; fi
              if [ "$new_zid" = "$old_zid" ] && [ "$new_doi" = "$old_doi" ]; then continue; fi

              # Determine sandbox vs prod from the config baked into the submodule, if possible.
              host="zenodo.org"
              if grep -q "sandbox:[[:space:]]*true" config.js 2>/dev/null; then
                host="sandbox.zenodo.org"
              fi

              zid_cell="—"
              [ -n "$new_zid" ] && zid_cell="[${new_zid}](https://${host}/record/${new_zid})"
              doi_cell="—"
              [ -n "$new_doi" ] && doi_cell="[${new_doi}](https://doi.org/${new_doi})"

              kind="updated"
              { [ -z "$old_zid" ] && [ -n "$new_zid" ]; } && kind="new"

              ZENODO_ROWS+="| ${kind} | \`${f}\` | ${zid_cell} | ${doi_cell} |"$'\n'
            done

            if [ -z "$ZENODO_ROWS" ]; then
              echo "_no new or updated Zenodo records_" >> "$summary"
            else
              echo "" >> "$summary"
              echo "| Status | Article | Zenodo ID | DOI |" >> "$summary"
              echo "| --- | --- | --- | --- |" >> "$summary"
              printf '%s' "$ZENODO_ROWS" >> "$summary"
            fi
          fi

          echo "" >> "$summary"
          echo "_Diff range: \`${PRE_SHA:0:7}..${POST_SHA:0:7}\` in submodule \`${PROCEEDINGS}\`._" >> "$summary"

      - name: 🤫 Setting up AWS credentials
        uses: 'aws-actions/configure-aws-credentials@v1'
        with:
          aws-access-key-id: ${{ env.ENV == 'prod' && secrets.AWS_ACCESS_KEY_ID ||  secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ env.ENV == 'prod' && secrets.AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🤫 Getting cloudfront secrets
        uses: 'marvinpinto/action-inject-ssm-secrets@latest'
        with:
          ssm_parameter: '/${{ github.event.inputs.name }}/cloudfront/id'
          env_variable_name: 'ssm_cloudfront_id'

      - name: 🤫 Getting S3 secrets
        uses: 'marvinpinto/action-inject-ssm-secrets@latest'
        with:
          ssm_parameter: '/${{ github.event.inputs.name}}/s3/name'
          env_variable_name: 'ssm_s3_name'

      # Content-aware deploy in three passes. The previous single
      # `aws s3 sync --delete` re-uploaded the WHOLE site (~4400 objects)
      # every run: CI regenerates every file, so every local file has a
      # fresh mtime and `sync`'s default mtime+size heuristic treats them
      # all as "newer". We split by mutability instead. Each pass carries
      # its own --delete, but AWS only deletes destination objects that
      # PASS that pass's include/exclude filter ("files excluded by filters
      # are excluded from deletion"), so each pass prunes orphans of its
      # OWN class and can never touch the other classes.
      #
      #   1. _nuxt/  — webpack output + content DB, all content-hash named
      #      (e.g. 0489d6b.js, db-cf83c36c.json). Immutable: a changed file
      #      gets a NEW name, so cache a year; --delete purges the previous
      #      build's now-orphaned hashes.
      #   2. media   — pdfs/thumbnails/svg/bibliography/images + other
      #      static assets. Large (~200MB+) and content-stable (PDFs/thumbs
      #      are only regenerated by publio when an article changes, then
      #      retro-pushed). `--size-only` ignores the churned mtimes and
      #      re-uploads only files whose SIZE changed; --delete (scoped to
      #      non-_nuxt, non-html) prunes media removed from an article.
      #   3. html    — page shells, regenerated every run. Small. Short
      #      cache so content edits go live quickly; --delete prunes pages
      #      that no longer exist.
      #
      # Passes 1+2 run before 3 so a freshly-uploaded HTML page never
      # references a hashed chunk or image that isn't on S3 yet.
      - name: 🚀 Deploy to S3 — immutable bundle (_nuxt) 🚀
        shell: bash
        run: |
          aws s3 sync dist/ "s3://${SSM_S3_NAME}/" \
            --acl public-read --follow-symlinks --no-progress \
            --delete \
            --exclude '*' --include '_nuxt/*' \
            --cache-control 'public, max-age=31536000, immutable'

      - name: 🚀 Deploy to S3 — static media (size-only) 🚀
        shell: bash
        run: |
          aws s3 sync dist/ "s3://${SSM_S3_NAME}/" \
            --acl public-read --follow-symlinks --no-progress \
            --size-only --delete \
            --exclude '_nuxt/*' --exclude '*.html' \
            --cache-control 'public, max-age=31536000, immutable'

      - name: 🚀 Deploy to S3 — HTML page shells 🚀
        shell: bash
        run: |
          aws s3 sync dist/ "s3://${SSM_S3_NAME}/" \
            --acl public-read --follow-symlinks --no-progress \
            --delete \
            --exclude '*' --include '*.html' \
            --cache-control 'public, max-age=300, must-revalidate' \
            --content-type 'text/html; charset=utf-8'

      # Only the mutable surface needs invalidating. _nuxt/* assets are
      # content-hash named (immutable) — a change ships under a new name,
      # so invalidating them would only evict a still-valid cache.
      #
      # CloudFront wildcard rule: `*` "replaces 0 or more characters" but
      # MUST be the last character in the path; an asterisk anywhere else
      # is treated as a literal. So we can't write `/*/index.html` (the
      # article/author/media pages live two levels deep) — instead we
      # invalidate the HTML route namespaces by trailing-wildcard prefix.
      # This still spares the bulk of the immutable cache (all of _nuxt/*
      # and the many root-level media files that aren't under these
      # prefixes), unlike the previous blanket `/*`.
      #
      # Covered: site root + the dynamic listing/detail namespaces
      # (article(s)/author(s)/media/issue), the PWA service worker (how
      # installed clients learn an update shipped), sitemap and robots.
      # The handful of static top-level pages (contact, support, …) are
      # cheap to add but change rarely; `/` + the SW update covers the
      # common navigation entry points.
      - name: 🔃 Invalidate Cloudfront Cache (mutable surface only)
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ env.SSM_CLOUDFRONT_ID }}
          PATHS: >-
            /
            /index.html
            /article*
            /author*
            /media*
            /issue*
            /sw.js
            /sitemap.xml
            /robots.txt

      - name: 🔌 Uptime Action
        uses: srt32/uptime@v0.2.1
        # TODO replace hard coded references to the repo with variables
        with:
          url-to-hit: 'https://${{ github.event.inputs.domain }}.pias.science'
          expected-statuses: '200,301'
