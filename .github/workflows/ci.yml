#https://emojipedia.org for emotes

name: ci

on:
  workflow_dispatch:
    inputs:
      cacheClean:
        description: 'CI Cache Clean'
        required: false
        default: ''
      name:
        description: 'Name of the proceedings to update'
        required: true
        default: 'PFIAS'
      domain:
        description: 'Subdomain of the proceedings to update'
        required: true
        default: 'france'
#  push:
#    branches:
#      - main
#    paths-ignore:
#      - 'infra/**'

env:
  ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
  AWS_REGION: 'eu-west-3' # paris
  NODE_OPTIONS: '--max_old_space_size=4096' # fix heap out of memory error (nuxt generate)

jobs:
  install:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [18]

    steps:
      - name: 🛎 Checkout ${{ github.event.inputs.name }}
        uses: actions/checkout@v3
        with:
          submodules: true
          token: ${{ secrets.SUBMODULE_GIT_TOKEN }}

      # Cancel previous runs to avoid wasting resources
      - name: 🧹 clean up runners
        # TODO replace hard coded references to the repo with variables
        run: |
          ids=$(gh api -H "Accept: application/vnd.github+json" /repos/IEA-Paris/PIAS/actions/runs | jq -s -c 'sort_by(.created_at) | .[]' | jq '.workflow_runs[] | select([.status] | inside(["in_progress", "queued"])) | .id')
          nids=$(echo $ids | wc -w)
          if [ $nids -gt 2 ]; then
            echo "too many runners"
            # Delete first and last runner
            ids=$(echo $ids | cut -d ' ' -f 2-  | rev | cut -d ' ' -f 2- | rev)
            set -- $ids
            # Stop all runners between first and last
            for i; do gh api --method POST -H "Accept: application/vnd.github+json" "/repos/IEA-Paris/PIAS/actions/runs/$i/cancel"; done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 🏗 Setup node env
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          check-latest: true

      - name: 🔄 Update submodules
        shell: bash
        run: |
          git submodule update --init --remote && git submodule foreach git config pull.rebase true && git checkout main && git pull origin main --allow-unrelated-histories
          rm -rf ./static/*
          echo `ls submodules/${{ github.event.inputs.name }}`
          cp -r ./submodules/${{ github.event.inputs.name }}/config.js ./config.js 
          cp -r ./submodules/${{ github.event.inputs.name }}/generated .
          cp -r ./submodules/${{ github.event.inputs.name }}/static .
          cp -r ./submodules/${{ github.event.inputs.name }}/pdfs ./static
          cp -r ./submodules/${{ github.event.inputs.name }}/thumbnails ./static
          cp -r ./submodules/${{ github.event.inputs.name }}/bibliography ./static
          cp -r ./submodules/${{ github.event.inputs.name }}/svg ./static
          cp -r ./admin ./static

      - name: 🛠 Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "::set-output name=dir::$(yarn cache dir)"

      - name: 📦 Cache node_modules
        if: github.event.inputs.cacheClean == ''
        uses: actions/cache@v3
        id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: 👨🏻‍💻 Install dependencies
        run: yarn

      - name: 🧪 Configure the CMS
        run: yarn configCMS

      #- name: Run tests 🧪
      #  run: yarn test

      - name: 🤞 Generate ${{ github.event.inputs.name }}
        run: yarn generate
        env:
          DEEPL_KEY: ${{ secrets.DEEPL_KEY }}
          orcid: ${{secrets.ORCID_SANDBOX_ID}}
          ORCID_SANDBOX_SECRET_KEY_ID: ${{secrets.ORCID_SANDBOX_SECRET_KEY_ID}}

      #   - name: Cache dist
      #    uses: actions/cache@v3
      #    with:
      #      path: dist
      #      key: ${{ matrix.os }}-node-v${{ matrix.node }}-${{ github.sha }}

      - name: ⤴️ Retro push generated content 🧙‍♂️
        # TODO replace hard coded references to the repo with variables
        shell: bash
        run: |
          cd submodules/${{ github.event.inputs.name }}
          PRE_SHA=$(git rev-parse HEAD)
          echo "PRE_SHA=$PRE_SHA" >> "$GITHUB_ENV"
          rsync -av   -a --include='*/' --exclude 'admin' --exclude='*' --exclude 'sw.js' ../../static/ ./static/
          git config --global user.name "CI"
          git config --global user.email "username@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "no generated changes to commit"
            echo "POST_SHA=$PRE_SHA" >> "$GITHUB_ENV"
          else
            git commit -m "[skip ci] auto-generated content"
            git status
            git push -f origin HEAD:main
            echo "POST_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          fi

      - name: 📝 Summarise generated artefacts
        if: always()
        shell: bash
        env:
          PROCEEDINGS: ${{ github.event.inputs.name }}
        run: |
          set -euo pipefail
          cd "submodules/${PROCEEDINGS}"

          summary="${GITHUB_STEP_SUMMARY:-/dev/stdout}"

          {
            echo "## ${PROCEEDINGS} — generated artefacts"
            echo ""
          } >> "$summary"

          if [ -z "${POST_SHA:-}" ] || [ "${POST_SHA}" = "${PRE_SHA:-}" ]; then
            echo "_No new content was retro-pushed in this run._" >> "$summary"
            exit 0
          fi

          # All paths added/modified in the auto-commit, NUL-separated for safety.
          CHANGED=()
          mapfile -d '' CHANGED < <(git diff --name-only -z --diff-filter=AM "${PRE_SHA}" "${POST_SHA}")

          filter_ext() {
            local prefix="$1"; shift
            local exts_re="$1"; shift
            for f in "${CHANGED[@]}"; do
              [[ -z "$f" ]] && continue
              if [[ "$f" == "$prefix"* ]] && [[ "$f" =~ \.($exts_re)$ ]]; then
                printf '%s\n' "$f"
              fi
            done | sort -u
          }

          # `git diff --diff-filter` doesn't expose Added-only directly across two SHAs reliably
          # when the file existed in PRE_SHA tree but not as the same blob — use a name-status pass
          # to separate Added vs Modified.
          declare -A STATUS
          while IFS=$'\t' read -r st path; do
            [[ -z "$path" ]] && continue
            STATUS["$path"]="$st"
          done < <(git diff --name-status "${PRE_SHA}" "${POST_SHA}")

          list_section() {
            local title="$1"; shift
            local files
            files=$(filter_ext "$@")
            local count
            count=$(printf '%s\n' "$files" | sed '/^$/d' | wc -l | tr -d ' ')
            echo "" >> "$summary"
            echo "### ${title} (${count})" >> "$summary"
            if [ "$count" = "0" ]; then
              echo "_none_" >> "$summary"
              return
            fi
            echo "" >> "$summary"
            echo "| Status | File |" >> "$summary"
            echo "| --- | --- |" >> "$summary"
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              local s="${STATUS[$f]:-?}"
              local label="modified"
              [[ "$s" == "A" ]] && label="new"
              echo "| ${label} | \`${f}\` |" >> "$summary"
            done <<< "$files"
          }

          list_section "PDFs"       "static/pdfs/"       "pdf"
          list_section "Thumbnails" "static/thumbnails/" "png|jpg|jpeg|webp|gif"
          list_section "SVGs"       "static/svg/"        "svg"

          # Images: anything image-ish under static/ that isn't already covered above.
          {
            echo ""
            echo "### Images (static/) — excluding pdfs/thumbnails/svg"
          } >> "$summary"
          IMG_LIST=$(
            for f in "${CHANGED[@]}"; do
              [[ -z "$f" ]] && continue
              [[ "$f" == static/pdfs/* ]] && continue
              [[ "$f" == static/thumbnails/* ]] && continue
              [[ "$f" == static/svg/* ]] && continue
              if [[ "$f" == static/* ]] && [[ "$f" =~ \.(png|jpe?g|webp|gif)$ ]]; then
                printf '%s\n' "$f"
              fi
            done | sort -u
          )
          IMG_COUNT=$(printf '%s\n' "$IMG_LIST" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$IMG_COUNT" = "0" ]; then
            echo "_none_" >> "$summary"
          else
            echo "" >> "$summary"
            echo "| Status | File |" >> "$summary"
            echo "| --- | --- |" >> "$summary"
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              s="${STATUS[$f]:-?}"
              label="modified"
              [[ "$s" == "A" ]] && label="new"
              echo "| ${label} | \`${f}\` |" >> "$summary"
            done <<< "$IMG_LIST"
          fi

          # Zenodo records: scan changed content/*.md files for newly written Zid / DOI.
          # A "new" record = Zid present in POST_SHA frontmatter and absent in PRE_SHA frontmatter.
          {
            echo ""
            echo "### Zenodo records"
          } >> "$summary"

          extract_field() {
            # extract_field <sha> <path> <field>  -> prints value or empty
            local sha="$1" p="$2" field="$3"
            { git show "${sha}:${p}" 2>/dev/null || true; } \
              | awk -v f="$field" '
                  /^---[[:space:]]*$/ { fm = !fm; if (!fm) exit; next }
                  fm && $0 ~ "^"f":[[:space:]]" {
                    sub("^"f":[[:space:]]*", "")
                    gsub(/^["\x27]|["\x27]$/, "")
                    print; exit
                  }'
          }

          MD_CHANGED=()
          for f in "${CHANGED[@]}"; do
            [[ "$f" == content/*.md ]] && MD_CHANGED+=("$f")
          done

          if [ "${#MD_CHANGED[@]}" -eq 0 ]; then
            echo "_no content frontmatter changes_" >> "$summary"
          else
            ZENODO_ROWS=""
            for f in "${MD_CHANGED[@]}"; do
              new_zid=$(extract_field "$POST_SHA" "$f" "Zid")
              new_doi=$(extract_field "$POST_SHA" "$f" "DOI")
              old_zid=$(extract_field "$PRE_SHA"  "$f" "Zid" || true)
              old_doi=$(extract_field "$PRE_SHA"  "$f" "DOI" || true)

              # Skip if nothing new
              if [ -z "$new_zid" ] && [ -z "$new_doi" ]; then continue; fi
              if [ "$new_zid" = "$old_zid" ] && [ "$new_doi" = "$old_doi" ]; then continue; fi

              # Determine sandbox vs prod from the config baked into the submodule, if possible.
              host="zenodo.org"
              if grep -q "sandbox:[[:space:]]*true" config.js 2>/dev/null; then
                host="sandbox.zenodo.org"
              fi

              zid_cell="—"
              [ -n "$new_zid" ] && zid_cell="[${new_zid}](https://${host}/record/${new_zid})"
              doi_cell="—"
              [ -n "$new_doi" ] && doi_cell="[${new_doi}](https://doi.org/${new_doi})"

              kind="updated"
              { [ -z "$old_zid" ] && [ -n "$new_zid" ]; } && kind="new"

              ZENODO_ROWS+="| ${kind} | \`${f}\` | ${zid_cell} | ${doi_cell} |"$'\n'
            done

            if [ -z "$ZENODO_ROWS" ]; then
              echo "_no new or updated Zenodo records_" >> "$summary"
            else
              echo "" >> "$summary"
              echo "| Status | Article | Zenodo ID | DOI |" >> "$summary"
              echo "| --- | --- | --- | --- |" >> "$summary"
              printf '%s' "$ZENODO_ROWS" >> "$summary"
            fi
          fi

          echo "" >> "$summary"
          echo "_Diff range: \`${PRE_SHA:0:7}..${POST_SHA:0:7}\` in submodule \`${PROCEEDINGS}\`._" >> "$summary"

      - name: 🤫 Setting up AWS credentials
        uses: 'aws-actions/configure-aws-credentials@v1'
        with:
          aws-access-key-id: ${{ env.ENV == 'prod' && secrets.AWS_ACCESS_KEY_ID ||  secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ env.ENV == 'prod' && secrets.AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🤫 Getting cloudfront secrets
        uses: 'marvinpinto/action-inject-ssm-secrets@latest'
        with:
          ssm_parameter: '/${{ github.event.inputs.name }}/cloudfront/id'
          env_variable_name: 'ssm_cloudfront_id'

      - name: 🤫 Getting S3 secrets
        uses: 'marvinpinto/action-inject-ssm-secrets@latest'
        with:
          ssm_parameter: '/${{ github.event.inputs.name}}/s3/name'
          env_variable_name: 'ssm_s3_name'

      - name: 🚀 Deploy to S3 🚀🚀
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ env.SSM_S3_NAME }}
          SOURCE_DIR: 'dist'

      - name: 🔃 Invalidate Cloudfront Cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ env.SSM_CLOUDFRONT_ID }}
          PATHS: '/*'

      - name: 🔌 Uptime Action
        uses: srt32/uptime@v0.2.1
        # TODO replace hard coded references to the repo with variables
        with:
          url-to-hit: 'https://${{ github.event.inputs.domain }}.pias.science'
          expected-statuses: '200,301'
